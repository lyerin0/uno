<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGIM GAMES</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#E3242B; --yellow:#FFC800; --green:#2BA84A; --blue:#0072CE;
    --table:#0e2a24; --table-light:#164138;
    --card-w:86px; --card-h:128px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:radial-gradient(ellipse at 50% 40%, var(--table-light) 0%, var(--table) 70%);
    color:#fff; overflow:hidden; user-select:none;
  }
  .num-font{font-family:'Baloo 2','Noto Sans KR',sans-serif;}
  .screen{display:none; height:100vh; height:100dvh;}
  .screen.active{display:flex;}

  /* ============================================================
     메뉴 화면
  ============================================================ */
  #menu-screen{flex-direction:column; align-items:center; justify-content:center; gap:36px; padding:20px;}
  #menu-title{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-style:italic;
    font-size:52px; letter-spacing:2px;
    color:var(--yellow); text-shadow:0 5px 0 rgba(0,0,0,.4);
  }
  #menu-sub{opacity:.6; font-size:14px; margin-top:-28px;}
  #menu-cards{display:flex; gap:24px; flex-wrap:wrap; justify-content:center;}
  .game-card{
    width:220px; height:260px; border-radius:20px; cursor:pointer;
    background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.15);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    transition:transform .15s, background .15s, border-color .15s;
  }
  .game-card:hover{transform:translateY(-8px) scale(1.02); background:rgba(255,255,255,.1); border-color:var(--yellow);}
  .game-card .icon{font-size:64px; line-height:1;}
  .game-card .name{font-family:'Baloo 2','Noto Sans KR',sans-serif; font-size:26px; font-weight:800;}
  .game-card .desc{font-size:12.5px; opacity:.65; text-align:center; padding:0 18px; line-height:1.5;}
  .mini-cards{display:flex;}
  .mini-card{
    width:40px; height:58px; border-radius:6px; border:3px solid #fff;
    box-shadow:0 3px 6px rgba(0,0,0,.4);
  }
  .mini-card:nth-child(1){background:var(--red); transform:rotate(-14deg) translateX(6px);}
  .mini-card:nth-child(2){background:var(--blue); transform:translateY(-6px); z-index:1;}
  .mini-card:nth-child(3){background:var(--green); transform:rotate(14deg) translateX(-6px);}
  .mini-board{
    width:64px; height:64px; border-radius:8px;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:4px;
    background:transparent;
  }
  .mini-board div{background:rgba(255,255,255,.25); border-radius:3px;}
  .mini-board div.p1{background:var(--blue);} .mini-board div.p2{background:var(--red);}
  .mini-board div.wall{background:var(--yellow);}

  .back-btn{
    position:absolute; top:12px; left:14px; z-index:15;
    background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.25); color:#fff;
    border-radius:20px; padding:6px 16px; font-size:13px; font-weight:700;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer;
  }
  .back-btn:hover{background:rgba(0,0,0,.55);}

  /* ============================================================
     UNO
  ============================================================ */
  #uno-screen{position:relative;}
  #game{display:flex; flex-direction:column; height:100%; width:100%; padding:10px 14px;}

  #ai-zone{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; min-height:120px;}
  .zone-label{display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; opacity:.85;}
  .zone-label .badge{background:rgba(255,255,255,.15); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:500;}
  .turn-dot{width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.2); transition:all .3s;}
  .turn-dot.active{background:var(--yellow); box-shadow:0 0 12px var(--yellow);}
  #ai-hand{display:flex; justify-content:center; height:76px;}
  #ai-hand .cardback{width:52px; height:76px; margin:0 -14px; border-radius:8px; transition:margin .3s;}

  #table-zone{flex:1 1 auto; display:flex; align-items:center; justify-content:center; gap:48px; position:relative;}
  #draw-pile{position:relative; cursor:pointer; transition:transform .15s; width:var(--card-w); height:var(--card-h);}
  #draw-pile:hover{transform:translateY(-4px);}
  #draw-pile .cardback{position:absolute; width:var(--card-w); height:var(--card-h); border-radius:12px;}
  #draw-pile .cardback:nth-child(1){transform:translate(4px,4px);}
  #draw-pile .cardback:nth-child(2){transform:translate(2px,2px);}
  .pile-label{position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px; opacity:.75; white-space:nowrap;}
  #draw-pile-wrap{position:relative; width:var(--card-w); height:var(--card-h);}
  #discard-wrap{position:relative; width:var(--card-w); height:var(--card-h);}
  #discard-wrap .card{position:absolute; top:0; left:0;}
  #discard-wrap .card:nth-last-child(2){transform:rotate(-7deg);}
  #discard-wrap .card:nth-last-child(3){transform:rotate(6deg);}

  #msg{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.55); border-radius:24px; padding:8px 20px;
    font-size:14px; font-weight:500; white-space:nowrap;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:5;
  }
  #msg.show{opacity:1;}

  #uno-shout{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:6;
  }
  #uno-shout span{
    font-family:'Baloo 2',sans-serif; font-size:0; font-weight:800; font-style:italic;
    color:var(--yellow); text-shadow:0 4px 0 rgba(0,0,0,.4);
    transition:font-size .25s cubic-bezier(.2,1.6,.4,1);
  }
  #uno-shout.show span{font-size:80px;}

  #player-zone{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:8px; padding-bottom:6px;}
  #player-hand{
    display:flex; justify-content:center; max-width:100%;
    height:calc(var(--card-h) + 22px); align-items:flex-end;
    overflow-x:auto; overflow-y:hidden; padding:0 10px;
    scrollbar-width:thin;
  }
  #player-hand .card{margin:0 -20px; flex:0 0 auto; transition:transform .15s, box-shadow .15s, margin .3s;}
  #player-hand .card.playable{cursor:pointer;}
  #player-hand .card.playable:hover{transform:translateY(-18px); z-index:10;}
  #player-hand .card.dead{filter:brightness(.55) saturate(.6);}
  #pass-btn{
    display:none; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.4);
    color:#fff; border-radius:24px; padding:8px 26px; font-size:14px; font-weight:700;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:background .15s;
  }
  #pass-btn:hover{background:rgba(255,255,255,.22);}
  #pass-btn.show{display:block;}

  .card{
    width:var(--card-w); height:var(--card-h); border-radius:12px;
    background:#fff; padding:6px; position:relative;
    box-shadow:0 3px 8px rgba(0,0,0,.35);
  }
  .card-inner{
    width:100%; height:100%; border-radius:8px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .card-inner.c-red{background:var(--red);} .card-inner.c-yellow{background:var(--yellow);}
  .card-inner.c-green{background:var(--green);} .card-inner.c-blue{background:var(--blue);}
  .card-inner.c-wild{background:#1b1b1b;}
  .card-inner .oval{
    position:absolute; width:130%; height:62%; background:rgba(255,255,255,.92);
    border-radius:50%; transform:rotate(-38deg);
  }
  .card-inner .big{
    position:relative; z-index:2; font-family:'Baloo 2',sans-serif; font-weight:800;
    font-size:44px; font-style:italic; line-height:1;
    text-shadow:2px 2px 0 rgba(0,0,0,.25);
  }
  .c-red .big{color:var(--red);} .c-yellow .big{color:#d9a800;}
  .c-green .big{color:var(--green);} .c-blue .big{color:var(--blue);}
  .card-inner .big.small-text{font-size:20px; font-style:normal; text-align:center;}
  .corner{
    position:absolute; z-index:3; font-family:'Baloo 2',sans-serif; font-weight:800;
    font-style:italic; font-size:15px; color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.35);
  }
  .corner.tl{top:4px; left:7px;} .corner.br{bottom:4px; right:7px; transform:rotate(180deg);}

  .wild-oval{
    position:absolute; width:130%; height:62%; border-radius:50%; transform:rotate(-38deg);
    overflow:hidden; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  }
  .wild-oval div:nth-child(1){background:var(--red);} .wild-oval div:nth-child(2){background:var(--blue);}
  .wild-oval div:nth-child(3){background:var(--yellow);} .wild-oval div:nth-child(4){background:var(--green);}
  .c-wild .big{
    color:#fff; font-size:34px; font-style:italic;
    text-shadow:2px 2px 0 rgba(0,0,0,.6), -1px -1px 0 rgba(0,0,0,.6);
  }
  .c-wild .big.wild-label{font-size:13px; font-style:normal; letter-spacing:1px;
    background:rgba(0,0,0,.65); border-radius:12px; padding:4px 10px; text-shadow:none;}
  .c-wild .corner{font-size:12px; font-style:normal;}

  .cardback{
    background:#1b1b1b; border:4px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.35);
    position:relative; overflow:hidden; border-radius:12px;
  }
  .cardback::before{
    content:''; position:absolute; width:150%; height:60%; top:20%; left:-25%;
    background:var(--red); border-radius:50%; transform:rotate(-38deg);
  }
  .cardback::after{
    content:'UNO'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2',sans-serif; font-weight:800; font-style:italic; color:var(--yellow);
    font-size:20px; text-shadow:1px 2px 0 rgba(0,0,0,.5); transform:rotate(-12deg);
  }
  #draw-pile .cardback::after{font-size:30px;}

  .cur-color{
    width:26px; height:26px; border-radius:50%; border:3px solid #fff;
    box-shadow:0 0 10px rgba(0,0,0,.4); transition:background .3s;
  }

  .fly{
    position:fixed; z-index:50; margin:0 !important; pointer-events:none;
    transition:transform .45s cubic-bezier(.3,.9,.35,1), opacity .45s;
    will-change:transform;
  }
  @keyframes pop-in{
    0%{transform:scale(1.25) rotate(-4deg);} 100%{transform:scale(1) rotate(0);}
  }
  #discard-wrap .card.just-played{animation:pop-in .25s ease-out;}
  @keyframes hand-in{
    0%{transform:translateY(24px); opacity:0;} 100%{transform:translateY(0); opacity:1;}
  }
  #player-hand .card.just-drawn{animation:hand-in .3s ease-out;}

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:20;
    display:none; align-items:center; justify-content:center;
  }
  .overlay.show{display:flex;}
  .panel{
    background:#17332c; border:1px solid rgba(255,255,255,.15); border-radius:20px;
    padding:32px 36px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .panel h2{font-family:'Baloo 2','Noto Sans KR',sans-serif; font-size:26px; margin-bottom:18px;}
  .color-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .color-btn{
    width:88px; height:88px; border-radius:16px; border:3px solid #fff; cursor:pointer;
    transition:transform .12s; box-shadow:0 4px 10px rgba(0,0,0,.35);
  }
  .color-btn:hover{transform:scale(1.08);}
  .color-btn.b-red{background:var(--red);} .color-btn.b-yellow{background:var(--yellow);}
  .color-btn.b-green{background:var(--green);} .color-btn.b-blue{background:var(--blue);}
  .result-title{font-size:44px; font-style:italic;}
  .result-sub{opacity:.8; margin:8px 0 22px; font-size:15px;}
  .primary-btn{
    background:var(--yellow); color:#1b1b1b; border:none; border-radius:28px;
    padding:12px 36px; font-size:16px; font-weight:800; font-family:'Baloo 2','Noto Sans KR',sans-serif;
    cursor:pointer; transition:transform .12s;
  }
  .primary-btn:hover{transform:scale(1.05);}
  .ghost-btn{
    background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.4); border-radius:28px;
    padding:12px 28px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; margin-left:10px;
  }
  .ghost-btn:hover{background:rgba(255,255,255,.1);}

  /* ============================================================
     쿼리도
  ============================================================ */
  #quoridor-screen{position:relative; flex-direction:column; align-items:center; padding:12px;}
  #q-top{display:flex; align-items:center; gap:10px; margin-top:36px;}
  #q-bottom{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; justify-content:center;}
  .q-player-tag{
    display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700;
    background:rgba(0,0,0,.3); border-radius:20px; padding:6px 16px;
  }
  .q-pawn-dot{width:14px; height:14px; border-radius:50%; border:2px solid #fff;}
  .q-pawn-dot.p1{background:var(--blue);} .q-pawn-dot.p2{background:var(--red);}
  .q-walls-left{font-size:12px; opacity:.75; font-weight:500;}

  #q-board-area{flex:1 1 auto; display:flex; align-items:center; justify-content:center; width:100%; min-height:0;}
  #q-board{position:relative; border-radius:14px; background:rgba(0,0,0,.28); padding:0; box-shadow:0 10px 40px rgba(0,0,0,.4);}
  .q-cell{
    position:absolute; background:rgba(255,255,255,.1); border-radius:6px;
  }
  .q-cell.goal-p1{background:rgba(0,114,206,.22);}
  .q-cell.goal-p2{background:rgba(227,36,43,.22);}
  .q-target{
    position:absolute; border-radius:50%; background:rgba(43,168,74,.85);
    border:2px solid #fff; cursor:pointer; z-index:6;
    transition:transform .12s; box-shadow:0 0 10px rgba(43,168,74,.7);
  }
  .q-target:hover{transform:scale(1.25);}
  @keyframes q-pulse{0%,100%{opacity:.85;}50%{opacity:.45;}}
  .q-target{animation:q-pulse 1.2s infinite;}
  .q-pawn{
    position:absolute; border-radius:50%; border:3px solid #fff; z-index:5;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
    transition:left .35s cubic-bezier(.3,.9,.35,1), top .35s cubic-bezier(.3,.9,.35,1);
  }
  .q-pawn.p1{background:radial-gradient(circle at 32% 30%, #4aa8ff, var(--blue) 65%);}
  .q-pawn.p2{background:radial-gradient(circle at 32% 30%, #ff6a6f, var(--red) 65%);}
  .q-wall{
    position:absolute; background:linear-gradient(#ffd84d, #e0a400); border-radius:4px; z-index:4;
    box-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  .q-wall.preview-ok{opacity:.55; box-shadow:0 0 10px var(--yellow);}
  .q-wall.preview-bad{background:#888; opacity:.4;}
  @keyframes wall-in{0%{transform:scale(1.3); opacity:0;}100%{transform:scale(1); opacity:1;}}
  .q-wall.just-placed{animation:wall-in .25s ease-out;}
  .q-slot{position:absolute; z-index:3; cursor:pointer;}
  #q-msg{
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.55); border-radius:24px; padding:8px 20px;
    font-size:14px; font-weight:500; white-space:nowrap;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:15;
  }
  #q-msg.show{opacity:1;}
  #q-help{font-size:12px; opacity:.55; text-align:center; line-height:1.6;}

  @media (max-width:600px){
    :root{--card-w:66px; --card-h:98px;}
    .card-inner .big{font-size:32px;}
    .c-wild .big{font-size:26px;}
    #table-zone{gap:24px;}
    #player-hand .card{margin:0 -24px;}
    #uno-shout.show span{font-size:56px;}
    #menu-title{font-size:38px;}
    .game-card{width:160px; height:210px;}
    .game-card .icon{font-size:44px;}
    .game-card .name{font-size:20px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>

<!-- ================= 메뉴 ================= -->
<div class="screen active" id="menu-screen">
  <div id="menu-title">RAGIM GAMES</div>
  <div id="menu-sub">플레이할 게임을 고르세요 · AI와 1:1 대전</div>
  <div id="menu-cards">
    <div class="game-card" id="play-uno">
      <div class="mini-cards"><div class="mini-card"></div><div class="mini-card"></div><div class="mini-card"></div></div>
      <div class="name">UNO</div>
      <div class="desc">카드를 먼저 다 내면 승리!<br>+2/+4 반격 스택 룰 적용</div>
    </div>
    <div class="game-card" id="play-quoridor">
      <div class="mini-board">
        <div></div><div class="p2"></div><div></div>
        <div class="wall"></div><div></div><div></div>
        <div></div><div class="p1"></div><div></div>
      </div>
      <div class="name">쿼리도</div>
      <div class="desc">벽으로 길을 막으며<br>반대편 끝에 먼저 도착!</div>
    </div>
  </div>
</div>

<!-- ================= UNO ================= -->
<div class="screen" id="uno-screen">
  <button class="back-btn" data-menu>← 메뉴</button>
  <div id="game">
    <div id="ai-zone">
      <div class="zone-label">
        <span class="turn-dot" id="ai-dot"></span>
        🤖 AI <span class="badge"><span id="ai-count">7</span>장</span>
      </div>
      <div id="ai-hand"></div>
    </div>

    <div id="table-zone">
      <div id="msg"></div>
      <div id="uno-shout"><span>UNO!</span></div>
      <div id="draw-pile-wrap">
        <div id="draw-pile">
          <div class="cardback"></div>
          <div class="cardback"></div>
          <div class="cardback"></div>
        </div>
        <div class="pile-label">뽑기</div>
      </div>
      <div id="discard-wrap"></div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div class="cur-color" id="cur-color"></div>
        <div style="font-size:11px; opacity:.6;">현재 색</div>
      </div>
    </div>

    <div id="player-zone">
      <button id="pass-btn">패스</button>
      <div class="zone-label">
        <span class="turn-dot" id="player-dot"></span>
        😎 나 <span class="badge"><span id="player-count">7</span>장</span>
      </div>
      <div id="player-hand"></div>
    </div>
  </div>
</div>

<!-- ================= 쿼리도 ================= -->
<div class="screen" id="quoridor-screen">
  <button class="back-btn" data-menu>← 메뉴</button>
  <div id="q-msg"></div>
  <div id="q-top">
    <div class="q-player-tag"><span class="turn-dot" id="q-ai-dot"></span><span class="q-pawn-dot p2"></span>🤖 AI <span class="q-walls-left">벽 <b id="q-ai-walls">10</b></span></div>
  </div>
  <div id="q-board-area"><div id="q-board"></div></div>
  <div id="q-bottom">
    <div class="q-player-tag"><span class="turn-dot" id="q-my-dot"></span><span class="q-pawn-dot p1"></span>😎 나 <span class="q-walls-left">벽 <b id="q-my-walls">10</b></span></div>
    <div id="q-help">초록 점 클릭 = 말 이동 · 칸 사이 홈 클릭 = 벽 설치<br>빨간 진영(맨 위 줄)에 먼저 도착하면 승리!</div>
  </div>
</div>

<!-- ================= 오버레이 ================= -->
<div class="overlay" id="color-overlay">
  <div class="panel">
    <h2>색을 선택하세요</h2>
    <div class="color-grid">
      <button class="color-btn b-red" data-color="red"></button>
      <button class="color-btn b-blue" data-color="blue"></button>
      <button class="color-btn b-yellow" data-color="yellow"></button>
      <button class="color-btn b-green" data-color="green"></button>
    </div>
  </div>
</div>

<div class="overlay" id="result-overlay">
  <div class="panel">
    <h2 class="num-font result-title" id="result-title">승리!</h2>
    <div class="result-sub" id="result-sub"></div>
    <button class="primary-btn" id="restart-btn">다시 하기</button>
    <button class="ghost-btn" data-menu>메뉴로</button>
  </div>
</div>

<div class="overlay" id="q-result-overlay">
  <div class="panel">
    <h2 class="num-font result-title" id="q-result-title">승리!</h2>
    <div class="result-sub" id="q-result-sub"></div>
    <button class="primary-btn" id="q-restart-btn">다시 하기</button>
    <button class="ghost-btn" data-menu>메뉴로</button>
  </div>
</div>

<script>
/* ============================================================
   화면 전환
============================================================ */
const $ = id => document.getElementById(id);
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'));
  $(id).classList.add('active');
}
document.querySelectorAll('[data-menu]').forEach(b=>{
  b.addEventListener('click', ()=> showScreen('menu-screen'));
});
$('play-uno').addEventListener('click', ()=>{ showScreen('uno-screen'); window.unoNewGame(); });
$('play-quoridor').addEventListener('click', ()=>{ showScreen('quoridor-screen'); window.quoridorNewGame(); });

/* ============================================================
   UNO
============================================================ */
(() => {
  const COLORS = ['red','yellow','green','blue'];
  const COLOR_KO = {red:'빨강', yellow:'노랑', green:'초록', blue:'파랑'};
  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let deck = [], discard = [], playerHand = [], aiHand = [];
  let currentColor = null, turn = 'player', locked = false, hasDrawnThisTurn = false;
  let gameOver = false;
  let pending = 0, pendingType = null; // 누적 벌칙 (+2/+4 반격 스택)
  let session = 0; // 메뉴로 나갔다 오면 이전 게임의 예약된 턴을 무효화

  function buildDeck(){
    const d = [];
    for(const c of COLORS){
      d.push({color:c, value:'0'});
      for(let i=1;i<=9;i++){ d.push({color:c, value:String(i)}); d.push({color:c, value:String(i)}); }
      for(const v of ['skip','reverse','draw2']){ d.push({color:c, value:v}); d.push({color:c, value:v}); }
    }
    for(let i=0;i<4;i++){ d.push({color:'wild', value:'wild'}); d.push({color:'wild', value:'wild4'}); }
    return shuffle(d);
  }
  function shuffle(a){
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function drawCard(){
    if(deck.length===0){
      if(discard.length<=1) return null;
      const top = discard.pop();
      deck = shuffle(discard.map(c => ({color:c.color, value:c.value})));
      deck.forEach(c => { if(c.value==='wild'||c.value==='wild4') c.color='wild'; });
      discard = [top];
    }
    return deck.pop();
  }

  function canPlay(card){
    if(pending > 0){
      if(pendingType==='draw2') return card.value==='draw2' || card.value==='wild4';
      return card.value==='wild4'; // +4에는 +4로만 반격 가능
    }
    const top = discard[discard.length-1];
    if(card.value==='wild' || card.value==='wild4') return true;
    return card.color===currentColor || card.value===top.value;
  }

  function valueLabel(v){
    return {skip:'🚫', reverse:'🔄', draw2:'+2', wild:'W', wild4:'+4'}[v] || v;
  }
  function cardName(card){
    if(card.value==='wild') return '색바꾸기';
    if(card.value==='wild4') return '와일드 +4';
    const n = {skip:'스킵', reverse:'리버스', draw2:'+2'}[card.value] || card.value;
    return `${COLOR_KO[card.color]||''} ${n}`.trim();
  }
  function cardEl(card, faceUp=true){
    const el = document.createElement('div');
    if(!faceUp){ el.className='cardback'; el.style.width='var(--card-w)'; el.style.height='var(--card-h)'; return el; }
    el.className='card';
    const inner = document.createElement('div');
    const isWild = card.value==='wild'||card.value==='wild4';
    inner.className = 'card-inner ' + (isWild ? 'c-wild' : 'c-'+card.color);
    if(isWild){
      const wo = document.createElement('div'); wo.className='wild-oval';
      for(let i=0;i<4;i++) wo.appendChild(document.createElement('div'));
      inner.appendChild(wo);
    } else {
      const o = document.createElement('div'); o.className='oval'; inner.appendChild(o);
    }
    const big = document.createElement('div');
    big.className = 'big';
    if(card.value==='wild'){
      big.classList.add('wild-label');
      big.textContent = '색바꾸기';
    } else {
      big.textContent = valueLabel(card.value);
      if(card.value==='skip'||card.value==='reverse') big.classList.add('small-text');
    }
    inner.appendChild(big);
    const label = valueLabel(card.value);
    for(const pos of ['tl','br']){
      const c = document.createElement('div'); c.className='corner '+pos; c.textContent=label;
      inner.appendChild(c);
    }
    el.appendChild(inner);
    return el;
  }

  function render(){
    const ah = $('ai-hand'); ah.innerHTML='';
    aiHand.forEach(()=> { const b=document.createElement('div'); b.className='cardback'; ah.appendChild(b); });
    $('ai-count').textContent = aiHand.length;

    const dw = $('discard-wrap'); dw.innerHTML='';
    discard.slice(-3).forEach(c => dw.appendChild(cardEl(c)));

    const ph = $('player-hand'); ph.innerHTML='';
    playerHand.forEach((card, idx)=>{
      const el = cardEl(card);
      const playable = turn==='player' && !locked && canPlay(card);
      el.classList.add(playable ? 'playable' : 'dead');
      if(turn!=='player'||locked) el.classList.remove('dead');
      if(playable) el.addEventListener('click', ev=> playerPlay(idx, ev.currentTarget));
      ph.appendChild(el);
    });
    $('player-count').textContent = playerHand.length;

    document.querySelector('.pile-label').innerHTML = (pending>0 && turn==='player')
      ? `<b style="color:var(--yellow)">클릭해서 ${pending}장 받기</b>`
      : `뽑기 (${deck.length})`;
    $('cur-color').style.background = `var(--${currentColor})`;
    $('player-dot').classList.toggle('active', turn==='player' && !gameOver);
    $('ai-dot').classList.toggle('active', turn==='ai' && !gameOver);
    $('pass-btn').classList.toggle('show', turn==='player' && hasDrawnThisTurn && !locked && !gameOver && pending===0);
  }

  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  function fly(node, fromRect, toRect, duration=420){
    if(reducedMotion){ node.remove?.(); return Promise.resolve(); }
    return new Promise(res=>{
      node.classList.add('fly');
      node.style.left = fromRect.left+'px';
      node.style.top = fromRect.top+'px';
      node.style.width = fromRect.width+'px';
      node.style.height = fromRect.height+'px';
      node.style.transitionDuration = duration+'ms';
      document.body.appendChild(node);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        const dx = toRect.left + (toRect.width - fromRect.width)/2 - fromRect.left;
        const dy = toRect.top + (toRect.height - fromRect.height)/2 - fromRect.top;
        const sc = toRect.width / fromRect.width;
        node.style.transform = `translate(${dx}px,${dy}px) scale(${sc}) rotate(${(Math.random()*14-7).toFixed(1)}deg)`;
      }));
      setTimeout(()=>{ node.remove(); res(); }, duration+40);
    });
  }
  function rect(el){ return el.getBoundingClientRect(); }

  async function animatePlay(card, sourceEl){
    const from = sourceEl ? rect(sourceEl) : rect($('ai-hand'));
    if(sourceEl) sourceEl.style.visibility='hidden';
    const flying = cardEl(card);
    await fly(flying, from, rect($('discard-wrap')));
  }
  async function animateDraw(toEl, count=1){
    const from = rect($('draw-pile'));
    const to = rect(toEl);
    for(let i=0;i<count;i++){
      const back = document.createElement('div');
      back.className='cardback';
      fly(back, from, to, 380);
      await sleep(count>1 ? 140 : 380);
    }
    if(count>1) await sleep(300);
  }
  function markLastDrawn(){
    const cards = $('player-hand').children;
    if(cards.length) cards[cards.length-1].classList.add('just-drawn');
  }
  function markJustPlayed(){
    const cards = $('discard-wrap').children;
    if(cards.length) cards[cards.length-1].classList.add('just-played');
  }

  let msgTimer;
  function msg(text, ms=1900){
    const m = $('msg'); m.textContent = text; m.classList.add('show');
    clearTimeout(msgTimer);
    msgTimer = setTimeout(()=> m.classList.remove('show'), ms);
  }
  function shoutUno(){
    const s = $('uno-shout'); s.classList.add('show');
    setTimeout(()=> s.classList.remove('show'), 1400);
  }

  /* 카드 효과 (2인전 + 반격 스택 룰)
     · 스킵/리버스: 2인전에서는 둘 다 "상대 턴 건너뛰기" → 'skip'
     · +2: 벌칙 2장 누적. 상대는 +2나 +4로 반격 가능 → 'pending'
     · 와일드+4: 벌칙 4장 누적. 상대는 +4로만 반격 가능 → 'pending'
     · 색바꾸기(wild): 색만 바꿈. 아무도 카드를 뽑지 않음 → 'none' */
  function applyEffect(card, byPlayer){
    switch(card.value){
      case 'skip':
      case 'reverse':
        msg(byPlayer ? 'AI 턴 건너뛰기! 🚫' : '내 턴을 건너뛰었어요 🚫');
        return 'skip';
      case 'draw2':
        pending += 2; pendingType = 'draw2';
        msg(byPlayer ? `+2! AI는 반격하거나 ${pending}장 뽑아야 해요` : `AI의 +2! 벌칙 ${pending}장 누적`, 2600);
        return 'pending';
      case 'wild4':
        pending += 4; pendingType = 'wild4';
        msg(byPlayer ? `+4! AI는 +4로 반격하거나 ${pending}장 뽑아야 해요` : `AI의 +4! 벌칙 ${pending}장 누적`, 2600);
        return 'pending';
    }
    return 'none';
  }
  async function dealTo(hand, count, toAI){
    const target = toAI ? $('ai-hand') : $('player-hand');
    await animateDraw(target, count);
    for(let i=0;i<count;i++){ const c=drawCard(); if(c) hand.push(c); }
    render();
    if(!toAI) markLastDrawn();
  }

  function checkWin(){
    if(playerHand.length===0){ endGame(true); return true; }
    if(aiHand.length===0){ endGame(false); return true; }
    return false;
  }
  function endGame(playerWon){
    gameOver = true; locked = true;
    render();
    setTimeout(()=>{
      $('result-title').textContent = playerWon ? '🎉 승리!' : '😵 패배...';
      $('result-title').style.color = playerWon ? 'var(--yellow)' : 'var(--red)';
      $('result-sub').textContent = playerWon
        ? 'AI를 이겼습니다! 한 판 더?'
        : `AI가 먼저 카드를 다 냈어요. 남은 카드: ${playerHand.length}장`;
      $('result-overlay').classList.add('show');
    }, 800);
  }

  async function playerPlay(idx, sourceEl){
    if(turn!=='player'||locked||gameOver) return;
    const card = playerHand[idx];
    if(!canPlay(card)) return;
    locked = true;
    const s = session;

    if(card.value==='wild'||card.value==='wild4'){
      const chosen = await chooseColor();
      if(s!==session) return;
      card.color = chosen;
      currentColor = chosen;
    } else {
      currentColor = card.color;
    }

    playerHand.splice(idx,1);
    await animatePlay(card, sourceEl);
    if(s!==session) return;
    discard.push(card);

    if(card.value==='wild') msg(`색바꾸기 → ${COLOR_KO[currentColor]}!`);
    if(playerHand.length===1) shoutUno();
    render();
    markJustPlayed();
    if(checkWin()) return;

    const effect = applyEffect(card, true);
    render();
    if(effect==='skip'){
      await sleep(900);
      if(s!==session) return;
      startPlayerTurn();
      msg('한 번 더 내 차례!');
    } else {
      await sleep(effect==='pending' ? 1000 : 500);
      if(s!==session) return;
      aiTurn();
    }
  }

  function startPlayerTurn(){
    turn='player'; locked=false; hasDrawnThisTurn=false;
    render();
    if(pending>0){
      msg(`벌칙 ${pending}장! 반격 카드를 내거나, 뽑기 더미를 눌러 받으세요`, 3200);
    }
  }

  $('draw-pile').addEventListener('click', async ()=>{
    if(turn!=='player'||locked||gameOver||hasDrawnThisTurn) return;
    locked = true;
    const s = session;
    if(pending>0){
      const n = pending; pending=0; pendingType=null;
      msg(`벌칙 ${n}장을 받았어요... 😢`);
      await dealTo(playerHand, n, false);
      await sleep(800);
      if(s!==session) return;
      aiTurn();
      return;
    }
    const c = drawCard();
    if(!c){ msg('덱에 카드가 없어요!'); locked=false; return; }
    await animateDraw($('player-hand'));
    if(s!==session) return;
    playerHand.push(c);
    hasDrawnThisTurn = true;

    if(canPlay(c)){
      msg('뽑은 카드를 낼 수 있어요! 내거나 패스하세요');
      locked = false;
      render();
      markLastDrawn();
    } else {
      msg('낼 수 있는 카드가 없네요... 패스!');
      render();
      markLastDrawn();
      setTimeout(()=>{ if(s===session) aiTurn(); }, 1100);
    }
  });

  $('pass-btn').addEventListener('click', ()=>{
    if(turn!=='player'||locked||!hasDrawnThisTurn) return;
    locked = true;
    const s = session;
    render();
    setTimeout(()=>{ if(s===session) aiTurn(); }, 400);
  });

  function chooseColor(){
    return new Promise(resolve=>{
      const ov = $('color-overlay');
      ov.classList.add('show');
      const btns = ov.querySelectorAll('.color-btn');
      const handler = e=>{
        btns.forEach(b=>b.removeEventListener('click', handler));
        ov.classList.remove('show');
        resolve(e.currentTarget.dataset.color);
      };
      btns.forEach(b=>b.addEventListener('click', handler));
    });
  }

  async function aiTurn(){
    if(gameOver) return;
    turn='ai'; locked=true;
    const s = session;
    render();
    await sleep(1100);
    if(s!==session) return;

    let playable = aiHand.map((c,i)=>({c,i})).filter(x=>canPlay(x.c));

    if(pending>0 && playable.length===0){
      const n = pending; pending=0; pendingType=null;
      msg(`AI가 벌칙 ${n}장을 받았어요! 🎉`);
      await dealTo(aiHand, n, true);
      await sleep(800);
      if(s!==session) return;
      startPlayerTurn();
      return;
    }

    if(playable.length===0){
      const drawn = drawCard();
      if(drawn){
        await animateDraw($('ai-hand'));
        if(s!==session) return;
        aiHand.push(drawn);
        msg('AI가 카드를 뽑았어요');
        render();
        await sleep(800);
        if(s!==session) return;
        if(canPlay(drawn)) playable=[{c:drawn, i:aiHand.length-1}];
      }
      if(playable.length===0){
        msg('AI 패스!');
        await sleep(700);
        if(s!==session) return;
        startPlayerTurn();
        return;
      }
    }

    const rank = c=>{
      if(pending>0) return c.value==='draw2' ? 0 : 1; // 반격 시 +2 먼저, +4는 아껴둠
      const atk = ['draw2','skip','reverse'].includes(c.value);
      if(playerHand.length<=2) return c.value==='wild4'?0 : atk?1 : c.value==='wild'?2 : 3;
      if(atk) return 2;
      if(c.value==='wild'||c.value==='wild4') return 4;
      return 1;
    };
    playable.sort((a,b)=>rank(a.c)-rank(b.c));
    const pick = playable[0];
    const card = aiHand.splice(pick.i,1)[0];

    if(card.value==='wild'||card.value==='wild4'){
      const count = {red:0,yellow:0,green:0,blue:0};
      aiHand.forEach(c=>{ if(count[c.color]!==undefined) count[c.color]++; });
      const chosen = COLORS.reduce((a,b)=> count[a]>=count[b]?a:b);
      card.color = chosen;
      currentColor = chosen;
    } else {
      currentColor = card.color;
    }

    await animatePlay(card, null);
    if(s!==session) return;
    discard.push(card);
    msg(`AI: ${cardName(card)}` + (card.value==='wild' ? ` → ${COLOR_KO[currentColor]}` : ''));
    if(aiHand.length===1) shoutUno();
    render();
    markJustPlayed();
    if(checkWin()) return;

    const effect = applyEffect(card, false);
    render();
    if(effect==='skip'){
      await sleep(1100);
      if(s!==session) return;
      aiTurn();
    } else {
      await sleep(effect==='pending' ? 1000 : 500);
      if(s!==session) return;
      startPlayerTurn();
    }
  }

  function newGame(){
    session++;
    deck = buildDeck();
    playerHand=[]; aiHand=[]; discard=[];
    gameOver=false; locked=false; hasDrawnThisTurn=false; pending=0; pendingType=null;
    for(let i=0;i<7;i++){ playerHand.push(drawCard()); aiHand.push(drawCard()); }
    let first = drawCard();
    while(first.value==='wild'||first.value==='wild4'||['skip','reverse','draw2'].includes(first.value)){
      deck.unshift(first);
      shuffle(deck);
      first = drawCard();
    }
    discard.push(first);
    currentColor = first.color;
    $('result-overlay').classList.remove('show');
    turn='player';
    msg('게임 시작! 당신 차례예요', 2200);
    render();
  }

  $('restart-btn').addEventListener('click', newGame);
  window.unoNewGame = newGame;
})();

/* ============================================================
   쿼리도 (Quoridor)
   · 9×9 판. 나(파랑)는 맨 아래에서 시작해 맨 윗줄 도착이 목표,
     AI(빨강)는 맨 위에서 시작해 맨 아랫줄 도착이 목표
   · 매 턴: 말 1칸 이동 또는 벽 1개 설치 (각자 벽 10개)
   · 벽은 2칸 길이. 상대 길을 완전히 막는 벽은 설치 불가 (경로 보장)
   · 상대 말과 붙어 있으면 뛰어넘기 가능, 뒤가 막혀 있으면 대각선 이동
============================================================ */
(() => {
  const N = 9;
  const board = $('q-board');
  let CELL = 44, GAP = 10;
  let hWalls, vWalls;          // Set("r,c")
  let me, ai;                  // {r,c}  me: 아래(파랑, 목표 r=0) / ai: 위(빨강, 목표 r=8)
  let myWalls, aiWalls;
  let qTurn, qLock, qOver;
  let session = 0;
  let lastWall = null;

  const key = (r,c)=> r+','+c;
  const inB = (r,c)=> r>=0 && r<N && c>=0 && c<N;
  const hasH = (r,c)=> hWalls.has(key(r,c));
  const hasV = (r,c)=> vWalls.has(key(r,c));

  // 인접 두 칸 사이 이동이 벽으로 막혔는지
  function blockedMove(r1,c1,r2,c2){
    if(r2===r1+1) return hasH(r1,c1) || hasH(r1,c1-1);
    if(r2===r1-1) return hasH(r2,c1) || hasH(r2,c1-1);
    if(c2===c1+1) return hasV(r1,c1) || hasV(r1-1,c1);
    if(c2===c1-1) return hasV(r1,c2) || hasV(r1-1,c2);
    return true;
  }

  // 뛰어넘기/대각선 포함한 말 이동 후보
  function pawnMoves(p, opp){
    const res = [];
    for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const r = p.r+dr, c = p.c+dc;
      if(!inB(r,c) || blockedMove(p.r,p.c,r,c)) continue;
      if(r===opp.r && c===opp.c){
        const jr = r+dr, jc = c+dc;
        if(inB(jr,jc) && !blockedMove(r,c,jr,jc)){
          res.push({r:jr, c:jc});
        } else {
          const sides = dr!==0 ? [[0,1],[0,-1]] : [[1,0],[-1,0]];
          for(const [sr,sc] of sides){
            const tr = r+sr, tc = c+sc;
            if(inB(tr,tc) && !blockedMove(r,c,tr,tc) && !(tr===p.r && tc===p.c)) res.push({r:tr, c:tc});
          }
        }
      } else res.push({r,c});
    }
    return res;
  }

  // 목표 줄까지 최단거리 BFS (벽만 고려)
  function bfs(start, goalRow){
    const dist = Array.from({length:N}, ()=>Array(N).fill(-1));
    const prev = {};
    const q = [[start.r, start.c]];
    dist[start.r][start.c] = 0;
    let goal = null;
    while(q.length){
      const [r,c] = q.shift();
      if(r===goalRow){ goal=[r,c]; break; }
      for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nr=r+dr, nc=c+dc;
        if(inB(nr,nc) && dist[nr][nc]<0 && !blockedMove(r,c,nr,nc)){
          dist[nr][nc] = dist[r][c]+1;
          prev[key(nr,nc)] = [r,c];
          q.push([nr,nc]);
        }
      }
    }
    if(!goal) return {dist: Infinity, next: null};
    let cur = goal, p = prev[key(cur[0],cur[1])];
    while(p && !(p[0]===start.r && p[1]===start.c)){ cur=p; p=prev[key(cur[0],cur[1])]; }
    const next = (goal[0]===start.r && goal[1]===start.c) ? null : {r:cur[0], c:cur[1]};
    return {dist: dist[goal[0]][goal[1]], next};
  }

  // 벽 설치 가능 여부 (겹침/교차/경로 차단 검사)
  function canWall(type, r, c){
    if(r<0 || r>7 || c<0 || c>7) return false;
    if(type==='h'){
      if(hasH(r,c) || hasH(r,c-1) || hasH(r,c+1) || hasV(r,c)) return false;
      hWalls.add(key(r,c));
      const ok = bfs(me,0).dist!==Infinity && bfs(ai,8).dist!==Infinity;
      hWalls.delete(key(r,c));
      return ok;
    } else {
      if(hasV(r,c) || hasV(r-1,c) || hasV(r+1,c) || hasH(r,c)) return false;
      vWalls.add(key(r,c));
      const ok = bfs(me,0).dist!==Infinity && bfs(ai,8).dist!==Infinity;
      vWalls.delete(key(r,c));
      return ok;
    }
  }
  function placeWall(type, r, c){
    (type==='h' ? hWalls : vWalls).add(key(r,c));
    lastWall = {type, r, c};
  }

  /* ---------- 레이아웃/렌더 ---------- */
  const px = i => i*(CELL+GAP) + GAP; // 보드 패딩 = GAP
  function layout(){
    const area = $('q-board-area');
    const avail = Math.min(area.clientWidth-8, area.clientHeight-8, 480);
    GAP = Math.max(7, Math.round(avail*0.022));
    CELL = Math.floor((avail - GAP*10)/9);
    const size = CELL*9 + GAP*10;
    board.style.width = size+'px';
    board.style.height = size+'px';
  }

  let qMsgTimer;
  function qMsg(text, ms=2200){
    const m = $('q-msg'); m.textContent = text; m.classList.add('show');
    clearTimeout(qMsgTimer);
    qMsgTimer = setTimeout(()=> m.classList.remove('show'), ms);
  }

  function render(){
    board.innerHTML = '';

    // 칸
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      const cell = document.createElement('div');
      cell.className = 'q-cell' + (r===0 ? ' goal-p1' : r===8 ? ' goal-p2' : '');
      cell.style.left = px(c)+'px'; cell.style.top = px(r)+'px';
      cell.style.width = CELL+'px'; cell.style.height = CELL+'px';
      board.appendChild(cell);
    }

    // 벽
    const wallEl = (type,r,c)=>{
      const w = document.createElement('div');
      w.className = 'q-wall';
      if(lastWall && lastWall.type===type && lastWall.r===r && lastWall.c===c) w.classList.add('just-placed');
      if(type==='h'){
        w.style.left = px(c)+'px'; w.style.top = (px(r)+CELL)+'px';
        w.style.width = (CELL*2+GAP)+'px'; w.style.height = GAP+'px';
      } else {
        w.style.left = (px(c)+CELL)+'px'; w.style.top = px(r)+'px';
        w.style.width = GAP+'px'; w.style.height = (CELL*2+GAP)+'px';
      }
      return w;
    };
    hWalls.forEach(k=>{ const [r,c]=k.split(',').map(Number); board.appendChild(wallEl('h',r,c)); });
    vWalls.forEach(k=>{ const [r,c]=k.split(',').map(Number); board.appendChild(wallEl('v',r,c)); });

    // 벽 설치 슬롯 (내 턴 + 벽이 남았을 때만)
    if(qTurn==='me' && !qLock && !qOver && myWalls>0){
      // 가로 홈: 칸 (r,c) 아래
      for(let r=0;r<8;r++) for(let c=0;c<N;c++){
        const s = document.createElement('div');
        s.className = 'q-slot';
        s.style.left = px(c)+'px'; s.style.top = (px(r)+CELL)+'px';
        s.style.width = CELL+'px'; s.style.height = GAP+'px';
        bindSlot(s, 'h', r, c);
        board.appendChild(s);
      }
      // 세로 홈: 칸 (r,c) 오른쪽
      for(let r=0;r<N;r++) for(let c=0;c<8;c++){
        const s = document.createElement('div');
        s.className = 'q-slot';
        s.style.left = (px(c)+CELL)+'px'; s.style.top = px(r)+'px';
        s.style.width = GAP+'px'; s.style.height = CELL+'px';
        bindSlot(s, 'v', r, c);
        board.appendChild(s);
      }
    }

    // 이동 후보 (내 턴)
    if(qTurn==='me' && !qLock && !qOver){
      for(const t of pawnMoves(me, ai)){
        const d = document.createElement('div');
        d.className = 'q-target';
        const sz = Math.round(CELL*0.42);
        d.style.width = sz+'px'; d.style.height = sz+'px';
        d.style.left = (px(t.c)+(CELL-sz)/2)+'px';
        d.style.top = (px(t.r)+(CELL-sz)/2)+'px';
        d.addEventListener('click', ()=> myMove(t));
        board.appendChild(d);
      }
    }

    // 말
    const pawn = (p, cls)=>{
      const el = document.createElement('div');
      el.className = 'q-pawn '+cls;
      const sz = Math.round(CELL*0.68);
      el.style.width = sz+'px'; el.style.height = sz+'px';
      el.style.left = (px(p.c)+(CELL-sz)/2)+'px';
      el.style.top = (px(p.r)+(CELL-sz)/2)+'px';
      board.appendChild(el);
    };
    pawn(ai, 'p2');
    pawn(me, 'p1');

    $('q-my-walls').textContent = myWalls;
    $('q-ai-walls').textContent = aiWalls;
    $('q-my-dot').classList.toggle('active', qTurn==='me' && !qOver);
    $('q-ai-dot').classList.toggle('active', qTurn==='ai' && !qOver);
  }

  /* ---------- 벽 슬롯 (홈 클릭 → 벽 설치, 호버 미리보기) ---------- */
  function slotTarget(type, r, c){
    if(type==='h'){
      if(c<8 && canWall('h',r,c)) return {type,r,c,valid:true};
      if(c>0 && canWall('h',r,c-1)) return {type,r,c:c-1,valid:true};
      return {type, r, c:Math.min(c,7), valid:false};
    } else {
      if(r<8 && canWall('v',r,c)) return {type,r,c,valid:true};
      if(r>0 && canWall('v',r-1,c)) return {type,r:r-1,c,valid:true};
      return {type, r:Math.min(r,7), c, valid:false};
    }
  }
  let previewEl = null;
  function clearPreview(){ if(previewEl){ previewEl.remove(); previewEl=null; } }
  function bindSlot(slot, type, r, c){
    slot.addEventListener('mouseenter', ()=>{
      clearPreview();
      const t = slotTarget(type, r, c);
      const w = document.createElement('div');
      w.className = 'q-wall ' + (t.valid ? 'preview-ok' : 'preview-bad');
      if(t.type==='h'){
        w.style.left = px(t.c)+'px'; w.style.top = (px(t.r)+CELL)+'px';
        w.style.width = (CELL*2+GAP)+'px'; w.style.height = GAP+'px';
      } else {
        w.style.left = (px(t.c)+CELL)+'px'; w.style.top = px(t.r)+'px';
        w.style.width = GAP+'px'; w.style.height = (CELL*2+GAP)+'px';
      }
      board.appendChild(w);
      previewEl = w;
    });
    slot.addEventListener('mouseleave', clearPreview);
    slot.addEventListener('click', ()=>{
      clearPreview();
      const t = slotTarget(type, r, c);
      if(!t.valid){ qMsg('여기에는 벽을 놓을 수 없어요 (겹침 또는 길 완전 차단)'); return; }
      placeWall(t.type, t.r, t.c);
      myWalls--;
      qLock = true;
      render();
      afterMyTurn();
    });
  }

  /* ---------- 진행 ---------- */
  function myMove(t){
    if(qTurn!=='me' || qLock || qOver) return;
    qLock = true;
    me = {r:t.r, c:t.c};
    render();
    if(me.r===0){ endQ(true); return; }
    afterMyTurn();
  }
  function afterMyTurn(){
    qTurn = 'ai';
    render();
    const s = session;
    setTimeout(()=>{ if(s===session) aiPlay(); }, 750);
  }

  function aiPlay(){
    if(qOver) return;
    const myPath = bfs(ai, 8);   // AI 경로
    const plPath = bfs(me, 0);   // 플레이어 경로

    // 벽 후보 평가: 플레이어 길이는 늘리고 내 길이는 안 늘어나는 벽
    let bestWall = null, bestScore = 0;
    if(aiWalls>0){
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        for(const type of ['h','v']){
          if(!canWall(type,r,c)) continue;
          (type==='h'?hWalls:vWalls).add(key(r,c));
          const npl = bfs(me,0).dist, nmy = bfs(ai,8).dist;
          (type==='h'?hWalls:vWalls).delete(key(r,c));
          const score = (npl - plPath.dist) - (nmy - myPath.dist);
          if(score > bestScore){ bestScore = score; bestWall = {type,r,c}; }
        }
      }
    }

    // 플레이어가 앞서거나 골에 가까우면 벽으로 방해, 아니면 전진
    const urgent = plPath.dist <= myPath.dist || plPath.dist <= 3;
    if(bestWall && ((urgent && bestScore>=1) || bestScore>=3)){
      placeWall(bestWall.type, bestWall.r, bestWall.c);
      aiWalls--;
      qMsg('AI가 벽을 설치했어요! 🧱');
    } else {
      // 뛰어넘기 포함 이동 후보 중 목표까지 가장 가까워지는 칸 선택
      const moves = pawnMoves(ai, me);
      let best = null, bestD = Infinity;
      for(const m of moves){
        const d = bfs({r:m.r, c:m.c}, 8).dist;
        if(d < bestD || (d===bestD && m.r > (best?best.r:-1))){ bestD = d; best = m; }
      }
      if(best){ ai = {r:best.r, c:best.c}; }
    }
    render();
    if(ai.r===8){ endQ(false); return; }
    qTurn = 'me';
    qLock = false;
    render();
  }

  function endQ(iWon){
    qOver = true;
    render();
    setTimeout(()=>{
      $('q-result-title').textContent = iWon ? '🎉 승리!' : '😵 패배...';
      $('q-result-title').style.color = iWon ? 'var(--yellow)' : 'var(--red)';
      $('q-result-sub').textContent = iWon
        ? '먼저 반대편에 도착했어요! 한 판 더?'
        : 'AI가 먼저 도착했어요. 벽을 더 전략적으로 써보세요!';
      $('q-result-overlay').classList.add('show');
    }, 600);
  }

  function newGame(){
    session++;
    hWalls = new Set(); vWalls = new Set();
    me = {r:8, c:4}; ai = {r:0, c:4};
    myWalls = 10; aiWalls = 10;
    qTurn = 'me'; qLock = false; qOver = false; lastWall = null;
    $('q-result-overlay').classList.remove('show');
    layout();
    render();
    qMsg('쿼리도 시작! 맨 윗줄에 먼저 도착하세요', 2600);
  }

  window.addEventListener('resize', ()=>{
    if($('quoridor-screen').classList.contains('active')){ layout(); render(); }
  });
  $('q-restart-btn').addEventListener('click', newGame);
  window.quoridorNewGame = newGame;
})();
</script>
</body>
