<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO — AI 대전</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#E3242B; --yellow:#FFC800; --green:#2BA84A; --blue:#0072CE;
    --table:#0e2a24; --table-light:#164138;
    --card-w:86px; --card-h:128px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:radial-gradient(ellipse at 50% 40%, var(--table-light) 0%, var(--table) 70%);
    color:#fff; overflow:hidden; user-select:none;
  }
  .num-font{font-family:'Baloo 2','Noto Sans KR',sans-serif;}

  #game{display:flex; flex-direction:column; height:100vh; height:100dvh; padding:10px 14px;}

  /* ===== 상단: AI 영역 ===== */
  #ai-zone{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; min-height:120px;}
  .zone-label{display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; opacity:.85;}
  .zone-label .badge{background:rgba(255,255,255,.15); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:500;}
  .turn-dot{width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.2); transition:all .3s;}
  .turn-dot.active{background:var(--yellow); box-shadow:0 0 12px var(--yellow);}
  #ai-hand{display:flex; justify-content:center; height:76px;}
  #ai-hand .cardback{width:52px; height:76px; margin:0 -14px; border-radius:8px; transition:margin .3s;}

  /* ===== 중앙: 테이블 ===== */
  #table-zone{flex:1 1 auto; display:flex; align-items:center; justify-content:center; gap:48px; position:relative;}
  #draw-pile{position:relative; cursor:pointer; transition:transform .15s; width:var(--card-w); height:var(--card-h);}
  #draw-pile:hover{transform:translateY(-4px);}
  #draw-pile .cardback{position:absolute; width:var(--card-w); height:var(--card-h); border-radius:12px;}
  #draw-pile .cardback:nth-child(1){transform:translate(4px,4px);}
  #draw-pile .cardback:nth-child(2){transform:translate(2px,2px);}
  .pile-label{position:absolute; bottom:-26px; left:50%; transform:translateX(-50%); font-size:12px; opacity:.6; white-space:nowrap;}
  #draw-pile-wrap{position:relative; width:var(--card-w); height:var(--card-h);}
  #discard-wrap{position:relative; width:var(--card-w); height:var(--card-h);}
  #discard-wrap .card{position:absolute; top:0; left:0;}
  #discard-wrap .card:nth-last-child(2){transform:rotate(-7deg);}
  #discard-wrap .card:nth-last-child(3){transform:rotate(6deg);}

  #msg{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.55); border-radius:24px; padding:8px 20px;
    font-size:14px; font-weight:500; white-space:nowrap;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:5;
  }
  #msg.show{opacity:1;}

  #uno-shout{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:6;
  }
  #uno-shout span{
    font-family:'Baloo 2',sans-serif; font-size:0; font-weight:800; font-style:italic;
    color:var(--yellow); text-shadow:0 4px 0 rgba(0,0,0,.4);
    transition:font-size .25s cubic-bezier(.2,1.6,.4,1);
  }
  #uno-shout.show span{font-size:80px;}

  /* ===== 하단: 플레이어 영역 ===== */
  #player-zone{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:8px; padding-bottom:6px;}
  #player-hand{
    display:flex; justify-content:center; max-width:100%;
    height:calc(var(--card-h) + 22px); align-items:flex-end;
    overflow-x:auto; overflow-y:hidden; padding:0 10px;
    scrollbar-width:thin;
  }
  #player-hand .card{margin:0 -20px; flex:0 0 auto; transition:transform .15s, box-shadow .15s, margin .3s;}
  #player-hand .card.playable{cursor:pointer;}
  #player-hand .card.playable:hover{transform:translateY(-18px); z-index:10;}
  #player-hand .card.dead{filter:brightness(.55) saturate(.6);}
  #pass-btn{
    display:none; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.4);
    color:#fff; border-radius:24px; padding:8px 26px; font-size:14px; font-weight:700;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:background .15s;
  }
  #pass-btn:hover{background:rgba(255,255,255,.22);}
  #pass-btn.show{display:block;}

  /* ===== 카드 ===== */
  .card{
    width:var(--card-w); height:var(--card-h); border-radius:12px;
    background:#fff; padding:6px; position:relative;
    box-shadow:0 3px 8px rgba(0,0,0,.35);
  }
  .card-inner{
    width:100%; height:100%; border-radius:8px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .card-inner.c-red{background:var(--red);} .card-inner.c-yellow{background:var(--yellow);}
  .card-inner.c-green{background:var(--green);} .card-inner.c-blue{background:var(--blue);}
  .card-inner.c-wild{background:#1b1b1b;}
  .card-inner .oval{
    position:absolute; width:130%; height:62%; background:rgba(255,255,255,.92);
    border-radius:50%; transform:rotate(-38deg);
  }
  .card-inner .big{
    position:relative; z-index:2; font-family:'Baloo 2',sans-serif; font-weight:800;
    font-size:44px; font-style:italic; line-height:1;
    text-shadow:2px 2px 0 rgba(0,0,0,.25);
  }
  .c-red .big{color:var(--red);} .c-yellow .big{color:#d9a800;}
  .c-green .big{color:var(--green);} .c-blue .big{color:var(--blue);}
  .card-inner .big.small-text{font-size:20px; font-style:normal; text-align:center;}
  .corner{
    position:absolute; z-index:3; font-family:'Baloo 2',sans-serif; font-weight:800;
    font-style:italic; font-size:15px; color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.35);
  }
  .corner.tl{top:4px; left:7px;} .corner.br{bottom:4px; right:7px; transform:rotate(180deg);}

  /* 와일드(색바꾸기)와 +4를 확실히 구분 */
  .wild-oval{
    position:absolute; width:130%; height:62%; border-radius:50%; transform:rotate(-38deg);
    overflow:hidden; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  }
  .wild-oval div:nth-child(1){background:var(--red);} .wild-oval div:nth-child(2){background:var(--blue);}
  .wild-oval div:nth-child(3){background:var(--yellow);} .wild-oval div:nth-child(4){background:var(--green);}
  .c-wild .big{
    color:#fff; font-size:34px; font-style:italic;
    text-shadow:2px 2px 0 rgba(0,0,0,.6), -1px -1px 0 rgba(0,0,0,.6);
  }
  .c-wild .big.wild-label{font-size:13px; font-style:normal; letter-spacing:1px;
    background:rgba(0,0,0,.65); border-radius:12px; padding:4px 10px; text-shadow:none;}
  .c-wild .corner{font-size:12px; font-style:normal;}

  .cardback{
    background:#1b1b1b; border:4px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.35);
    position:relative; overflow:hidden; border-radius:12px;
  }
  .cardback::before{
    content:''; position:absolute; width:150%; height:60%; top:20%; left:-25%;
    background:var(--red); border-radius:50%; transform:rotate(-38deg);
  }
  .cardback::after{
    content:'UNO'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2',sans-serif; font-weight:800; font-style:italic; color:var(--yellow);
    font-size:20px; text-shadow:1px 2px 0 rgba(0,0,0,.5); transform:rotate(-12deg);
  }
  #draw-pile .cardback::after{font-size:30px;}

  .cur-color{
    width:26px; height:26px; border-radius:50%; border:3px solid #fff;
    box-shadow:0 0 10px rgba(0,0,0,.4); transition:background .3s;
  }

  /* ===== 날아가는 카드 (애니메이션) ===== */
  .fly{
    position:fixed; z-index:50; margin:0 !important; pointer-events:none;
    transition:transform .45s cubic-bezier(.3,.9,.35,1), opacity .45s;
    will-change:transform;
  }
  @keyframes pop-in{
    0%{transform:scale(1.25) rotate(-4deg);} 100%{transform:scale(1) rotate(0);}
  }
  #discard-wrap .card.just-played{animation:pop-in .25s ease-out;}
  @keyframes hand-in{
    0%{transform:translateY(24px); opacity:0;} 100%{transform:translateY(0); opacity:1;}
  }
  #player-hand .card.just-drawn{animation:hand-in .3s ease-out;}

  /* ===== 색상 선택 / 결과 오버레이 ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:20;
    display:none; align-items:center; justify-content:center;
  }
  .overlay.show{display:flex;}
  .panel{
    background:#17332c; border:1px solid rgba(255,255,255,.15); border-radius:20px;
    padding:32px 36px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .panel h2{font-family:'Baloo 2','Noto Sans KR',sans-serif; font-size:26px; margin-bottom:18px;}
  .color-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .color-btn{
    width:88px; height:88px; border-radius:16px; border:3px solid #fff; cursor:pointer;
    transition:transform .12s; box-shadow:0 4px 10px rgba(0,0,0,.35);
  }
  .color-btn:hover{transform:scale(1.08);}
  .color-btn.b-red{background:var(--red);} .color-btn.b-yellow{background:var(--yellow);}
  .color-btn.b-green{background:var(--green);} .color-btn.b-blue{background:var(--blue);}
  #result-title{font-size:44px; font-style:italic;}
  #result-sub{opacity:.8; margin:8px 0 22px; font-size:15px;}
  .primary-btn{
    background:var(--yellow); color:#1b1b1b; border:none; border-radius:28px;
    padding:12px 36px; font-size:16px; font-weight:800; font-family:'Baloo 2','Noto Sans KR',sans-serif;
    cursor:pointer; transition:transform .12s;
  }
  .primary-btn:hover{transform:scale(1.05);}

  @media (max-width:600px){
    :root{--card-w:66px; --card-h:98px;}
    .card-inner .big{font-size:32px;}
    .c-wild .big{font-size:26px;}
    #table-zone{gap:24px;}
    #player-hand .card{margin:0 -24px;}
    #uno-shout.show span{font-size:56px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>

<div id="game">
  <div id="ai-zone">
    <div class="zone-label">
      <span class="turn-dot" id="ai-dot"></span>
      🤖 AI <span class="badge"><span id="ai-count">7</span>장</span>
    </div>
    <div id="ai-hand"></div>
  </div>

  <div id="table-zone">
    <div id="msg"></div>
    <div id="uno-shout"><span>UNO!</span></div>
    <div id="draw-pile-wrap">
      <div id="draw-pile">
        <div class="cardback"></div>
        <div class="cardback"></div>
        <div class="cardback"></div>
      </div>
      <div class="pile-label">뽑기 (<span id="deck-count">0</span>)</div>
    </div>
    <div id="discard-wrap"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div class="cur-color" id="cur-color"></div>
      <div style="font-size:11px; opacity:.6;">현재 색</div>
    </div>
  </div>

  <div id="player-zone">
    <button id="pass-btn">패스</button>
    <div class="zone-label">
      <span class="turn-dot" id="player-dot"></span>
      😎 나 <span class="badge"><span id="player-count">7</span>장</span>
    </div>
    <div id="player-hand"></div>
  </div>
</div>

<div class="overlay" id="color-overlay">
  <div class="panel">
    <h2>색을 선택하세요</h2>
    <div class="color-grid">
      <button class="color-btn b-red" data-color="red"></button>
      <button class="color-btn b-blue" data-color="blue"></button>
      <button class="color-btn b-yellow" data-color="yellow"></button>
      <button class="color-btn b-green" data-color="green"></button>
    </div>
  </div>
</div>

<div class="overlay" id="result-overlay">
  <div class="panel">
    <h2 class="num-font" id="result-title">승리!</h2>
    <div id="result-sub"></div>
    <button class="primary-btn" id="restart-btn">다시 하기</button>
  </div>
</div>

<script>
(() => {
  const COLORS = ['red','yellow','green','blue'];
  const COLOR_KO = {red:'빨강', yellow:'노랑', green:'초록', blue:'파랑'};
  const $ = id => document.getElementById(id);
  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let deck = [], discard = [], playerHand = [], aiHand = [];
  let currentColor = null, turn = 'player', locked = false, hasDrawnThisTurn = false;
  let gameOver = false;
  let pending = 0, pendingType = null; // 누적 벌칙 (+2/+4 반격 스택)

  /* ---------- 덱 ---------- */
  function buildDeck(){
    const d = [];
    for(const c of COLORS){
      d.push({color:c, value:'0'});
      for(let i=1;i<=9;i++){ d.push({color:c, value:String(i)}); d.push({color:c, value:String(i)}); }
      for(const v of ['skip','reverse','draw2']){ d.push({color:c, value:v}); d.push({color:c, value:v}); }
    }
    for(let i=0;i<4;i++){ d.push({color:'wild', value:'wild'}); d.push({color:'wild', value:'wild4'}); }
    return shuffle(d);
  }
  function shuffle(a){
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function drawCard(){
    if(deck.length===0){
      if(discard.length<=1) return null;
      const top = discard.pop();
      deck = shuffle(discard.map(c => ({color:c.color, value:c.value})));
      deck.forEach(c => { if(c.value==='wild'||c.value==='wild4') c.color='wild'; });
      discard = [top];
    }
    return deck.pop();
  }

  /* ---------- 규칙 ---------- */
  function canPlay(card){
    if(pending > 0){
      // 벌칙 누적 중: 반격 카드만 낼 수 있음
      if(pendingType==='draw2') return card.value==='draw2' || card.value==='wild4';
      return card.value==='wild4'; // +4에는 +4로만 반격 가능
    }
    const top = discard[discard.length-1];
    if(card.value==='wild' || card.value==='wild4') return true;
    return card.color===currentColor || card.value===top.value;
  }

  /* ---------- 카드 렌더링 ---------- */
  function valueLabel(v){
    return {skip:'🚫', reverse:'🔄', draw2:'+2', wild:'W', wild4:'+4'}[v] || v;
  }
  function cardName(card){
    if(card.value==='wild') return '색바꾸기';
    if(card.value==='wild4') return '와일드 +4';
    const n = {skip:'스킵', reverse:'리버스', draw2:'+2'}[card.value] || card.value;
    return `${COLOR_KO[card.color]||''} ${n}`.trim();
  }
  function cardEl(card, faceUp=true){
    const el = document.createElement('div');
    if(!faceUp){ el.className='cardback'; el.style.width='var(--card-w)'; el.style.height='var(--card-h)'; return el; }
    el.className='card';
    const inner = document.createElement('div');
    const isWild = card.value==='wild'||card.value==='wild4';
    inner.className = 'card-inner ' + (isWild ? 'c-wild' : 'c-'+card.color);
    if(isWild){
      const wo = document.createElement('div'); wo.className='wild-oval';
      for(let i=0;i<4;i++) wo.appendChild(document.createElement('div'));
      inner.appendChild(wo);
    } else {
      const o = document.createElement('div'); o.className='oval'; inner.appendChild(o);
    }
    const big = document.createElement('div');
    big.className = 'big';
    if(card.value==='wild'){
      // 색바꾸기 카드: +4와 절대 헷갈리지 않게 라벨 표시
      big.classList.add('wild-label');
      big.textContent = '색바꾸기';
    } else {
      big.textContent = valueLabel(card.value);
      if(card.value==='skip'||card.value==='reverse') big.classList.add('small-text');
    }
    inner.appendChild(big);
    const label = valueLabel(card.value);
    for(const pos of ['tl','br']){
      const c = document.createElement('div'); c.className='corner '+pos; c.textContent=label;
      inner.appendChild(c);
    }
    el.appendChild(inner);
    return el;
  }

  function render(){
    const ah = $('ai-hand'); ah.innerHTML='';
    aiHand.forEach(()=> { const b=document.createElement('div'); b.className='cardback'; ah.appendChild(b); });
    $('ai-count').textContent = aiHand.length;

    const dw = $('discard-wrap'); dw.innerHTML='';
    discard.slice(-3).forEach(c => dw.appendChild(cardEl(c)));

    const ph = $('player-hand'); ph.innerHTML='';
    playerHand.forEach((card, idx)=>{
      const el = cardEl(card);
      const playable = turn==='player' && !locked && canPlay(card);
      el.classList.add(playable ? 'playable' : 'dead');
      if(turn!=='player'||locked) el.classList.remove('dead');
      if(playable) el.addEventListener('click', ev=> playerPlay(idx, ev.currentTarget));
      ph.appendChild(el);
    });
    $('player-count').textContent = playerHand.length;

    document.querySelector('.pile-label').innerHTML = (pending>0 && turn==='player')
      ? `<b style="color:var(--yellow)">클릭해서 ${pending}장 받기</b>`
      : `뽑기 (${deck.length})`;
    $('cur-color').style.background = `var(--${currentColor})`;
    $('player-dot').classList.toggle('active', turn==='player' && !gameOver);
    $('ai-dot').classList.toggle('active', turn==='ai' && !gameOver);
    $('pass-btn').classList.toggle('show', turn==='player' && hasDrawnThisTurn && !locked && !gameOver && pending===0);
  }

  /* ---------- 애니메이션 ---------- */
  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  // node(또는 새로 만든 카드)를 fromRect에서 toRect로 날림
  function fly(node, fromRect, toRect, duration=420){
    if(reducedMotion){ node.remove?.(); return Promise.resolve(); }
    return new Promise(res=>{
      node.classList.add('fly');
      node.style.left = fromRect.left+'px';
      node.style.top = fromRect.top+'px';
      node.style.width = fromRect.width+'px';
      node.style.height = fromRect.height+'px';
      node.style.transitionDuration = duration+'ms';
      document.body.appendChild(node);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        const dx = toRect.left + (toRect.width - fromRect.width)/2 - fromRect.left;
        const dy = toRect.top + (toRect.height - fromRect.height)/2 - fromRect.top;
        const sc = toRect.width / fromRect.width;
        node.style.transform = `translate(${dx}px,${dy}px) scale(${sc}) rotate(${(Math.random()*14-7).toFixed(1)}deg)`;
      }));
      setTimeout(()=>{ node.remove(); res(); }, duration+40);
    });
  }
  function rect(el){ return el.getBoundingClientRect(); }

  // 손패 → 버린 더미
  async function animatePlay(card, sourceEl){
    const from = sourceEl ? rect(sourceEl) : rect($('ai-hand'));
    if(sourceEl) sourceEl.style.visibility='hidden';
    const flying = cardEl(card);
    await fly(flying, from, rect($('discard-wrap')));
  }
  // 뽑기 더미 → 손패 (뒷면으로 날아감)
  async function animateDraw(toEl, count=1, faceCard=null){
    const from = rect($('draw-pile'));
    const to = rect(toEl);
    for(let i=0;i<count;i++){
      const back = document.createElement('div');
      back.className='cardback';
      fly(back, from, to, 380);
      await sleep(count>1 ? 140 : 380);
    }
    if(count>1) await sleep(300);
  }
  function markLastDrawn(){
    const cards = $('player-hand').children;
    if(cards.length) cards[cards.length-1].classList.add('just-drawn');
  }
  function markJustPlayed(){
    const cards = $('discard-wrap').children;
    if(cards.length) cards[cards.length-1].classList.add('just-played');
  }

  /* ---------- 메시지 ---------- */
  let msgTimer;
  function msg(text, ms=1900){
    const m = $('msg'); m.textContent = text; m.classList.add('show');
    clearTimeout(msgTimer);
    msgTimer = setTimeout(()=> m.classList.remove('show'), ms);
  }
  function shoutUno(){
    const s = $('uno-shout'); s.classList.add('show');
    setTimeout(()=> s.classList.remove('show'), 1400);
  }

  /* ---------- 카드 효과 (2인전 + 반격 스택 룰) ----------
     · 스킵/리버스: 2인전에서는 둘 다 "상대 턴 건너뛰기" → 'skip'
     · +2: 벌칙 2장 누적. 상대는 +2나 +4로 반격 가능 → 'pending'
     · 와일드+4: 벌칙 4장 누적. 상대는 +4로만 반격 가능 → 'pending'
     · 반격이 이어지면 벌칙이 계속 쌓이고, 못 막는 쪽이 전부 뽑고 턴을 잃음
     · 색바꾸기(wild): 색만 바꿈. 아무도 카드를 뽑지 않음 → 'none'  */
  function applyEffect(card, byPlayer){
    switch(card.value){
      case 'skip':
      case 'reverse':
        msg(byPlayer ? 'AI 턴 건너뛰기! 🚫' : '내 턴을 건너뛰었어요 🚫');
        return 'skip';
      case 'draw2':
        pending += 2; pendingType = 'draw2';
        msg(byPlayer ? `+2! AI는 반격하거나 ${pending}장 뽑아야 해요` : `AI의 +2! 벌칙 ${pending}장 누적`, 2600);
        return 'pending';
      case 'wild4':
        pending += 4; pendingType = 'wild4';
        msg(byPlayer ? `+4! AI는 +4로 반격하거나 ${pending}장 뽑아야 해요` : `AI의 +4! 벌칙 ${pending}장 누적`, 2600);
        return 'pending';
    }
    return 'none';
  }
  async function dealTo(hand, count, toAI){
    const target = toAI ? $('ai-hand') : $('player-hand');
    await animateDraw(target, count);
    for(let i=0;i<count;i++){ const c=drawCard(); if(c) hand.push(c); }
    render();
    if(!toAI) markLastDrawn();
  }

  function checkWin(){
    if(playerHand.length===0){ endGame(true); return true; }
    if(aiHand.length===0){ endGame(false); return true; }
    return false;
  }
  function endGame(playerWon){
    gameOver = true; locked = true;
    render();
    setTimeout(()=>{
      $('result-title').textContent = playerWon ? '🎉 승리!' : '😵 패배...';
      $('result-title').style.color = playerWon ? 'var(--yellow)' : 'var(--red)';
      $('result-sub').textContent = playerWon
        ? 'AI를 이겼습니다! 한 판 더?'
        : `AI가 먼저 카드를 다 냈어요. 남은 카드: ${playerHand.length}장`;
      $('result-overlay').classList.add('show');
    }, 800);
  }

  /* ---------- 플레이어 턴 ---------- */
  async function playerPlay(idx, sourceEl){
    if(turn!=='player'||locked||gameOver) return;
    const card = playerHand[idx];
    if(!canPlay(card)) return;
    locked = true;

    if(card.value==='wild'||card.value==='wild4'){
      const chosen = await chooseColor();
      card.color = chosen;
      currentColor = chosen;
    } else {
      currentColor = card.color;
    }

    playerHand.splice(idx,1);
    await animatePlay(card, sourceEl);
    discard.push(card);

    if(card.value==='wild') msg(`색바꾸기 → ${COLOR_KO[currentColor]}!`);
    if(playerHand.length===1) shoutUno();
    render();
    markJustPlayed();
    if(checkWin()) return;

    const effect = applyEffect(card, true);
    render();
    if(effect==='skip'){
      await sleep(900);
      startPlayerTurn();
      msg('한 번 더 내 차례!');
    } else {
      await sleep(effect==='pending' ? 1000 : 500);
      aiTurn();
    }
  }

  function startPlayerTurn(){
    turn='player'; locked=false; hasDrawnThisTurn=false;
    render();
    if(pending>0){
      msg(`벌칙 ${pending}장! 반격 카드를 내거나, 뽑기 더미를 눌러 받으세요`, 3200);
    }
  }

  $('draw-pile').addEventListener('click', async ()=>{
    if(turn!=='player'||locked||gameOver||hasDrawnThisTurn) return;
    locked = true;
    if(pending>0){
      // 반격 포기: 누적 벌칙 전부 받고 턴을 잃음
      const n = pending; pending=0; pendingType=null;
      msg(`벌칙 ${n}장을 받았어요... 😢`);
      await dealTo(playerHand, n, false);
      await sleep(800);
      aiTurn();
      return;
    }
    const c = drawCard();
    if(!c){ msg('덱에 카드가 없어요!'); locked=false; return; }
    await animateDraw($('player-hand'));
    playerHand.push(c);
    hasDrawnThisTurn = true;

    if(canPlay(c)){
      msg('뽑은 카드를 낼 수 있어요! 내거나 패스하세요');
      locked = false;
      render();
      markLastDrawn();
    } else {
      msg('낼 수 있는 카드가 없네요... 패스!');
      render();
      markLastDrawn();
      setTimeout(aiTurn, 1100);
    }
  });

  $('pass-btn').addEventListener('click', ()=>{
    if(turn!=='player'||locked||!hasDrawnThisTurn) return;
    locked = true;
    render();
    setTimeout(aiTurn, 400);
  });

  function chooseColor(){
    return new Promise(resolve=>{
      const ov = $('color-overlay');
      ov.classList.add('show');
      const btns = ov.querySelectorAll('.color-btn');
      const handler = e=>{
        btns.forEach(b=>b.removeEventListener('click', handler));
        ov.classList.remove('show');
        resolve(e.currentTarget.dataset.color);
      };
      btns.forEach(b=>b.addEventListener('click', handler));
    });
  }

  /* ---------- AI 턴 ---------- */
  async function aiTurn(){
    if(gameOver) return;
    turn='ai'; locked=true;
    render();
    await sleep(1100);

    let playable = aiHand.map((c,i)=>({c,i})).filter(x=>canPlay(x.c));

    if(pending>0 && playable.length===0){
      // AI가 반격 못함: 누적 벌칙 전부 받고 턴을 잃음
      const n = pending; pending=0; pendingType=null;
      msg(`AI가 벌칙 ${n}장을 받았어요! 🎉`);
      await dealTo(aiHand, n, true);
      await sleep(800);
      startPlayerTurn();
      return;
    }

    if(playable.length===0){
      const drawn = drawCard();
      if(drawn){
        await animateDraw($('ai-hand'));
        aiHand.push(drawn);
        msg('AI가 카드를 뽑았어요');
        render();
        await sleep(800);
        if(canPlay(drawn)) playable=[{c:drawn, i:aiHand.length-1}];
      }
      if(playable.length===0){
        msg('AI 패스!');
        await sleep(700);
        startPlayerTurn();
        return;
      }
    }

    // AI 전략: 플레이어 카드가 적으면 공격 카드 우선, 아니면 숫자 카드 우선. 와일드는 아껴둠
    const rank = c=>{
      if(pending>0) return c.value==='draw2' ? 0 : 1; // 반격 시 +2 먼저, +4는 아껴둠
      const atk = ['draw2','skip','reverse'].includes(c.value);
      if(playerHand.length<=2) return c.value==='wild4'?0 : atk?1 : c.value==='wild'?2 : 3;
      if(atk) return 2;
      if(c.value==='wild'||c.value==='wild4') return 4;
      return 1;
    };
    playable.sort((a,b)=>rank(a.c)-rank(b.c));
    const pick = playable[0];
    const card = aiHand.splice(pick.i,1)[0];

    if(card.value==='wild'||card.value==='wild4'){
      const count = {red:0,yellow:0,green:0,blue:0};
      aiHand.forEach(c=>{ if(count[c.color]!==undefined) count[c.color]++; });
      const chosen = COLORS.reduce((a,b)=> count[a]>=count[b]?a:b);
      card.color = chosen;
      currentColor = chosen;
    } else {
      currentColor = card.color;
    }

    await animatePlay(card, null);
    discard.push(card);
    msg(`AI: ${cardName(card)}` + (card.value==='wild' ? ` → ${COLOR_KO[currentColor]}` : ''));
    if(aiHand.length===1) shoutUno();
    render();
    markJustPlayed();
    if(checkWin()) return;

    const effect = applyEffect(card, false);
    render();
    if(effect==='skip'){
      await sleep(1100);
      aiTurn();
    } else {
      await sleep(effect==='pending' ? 1000 : 500);
      startPlayerTurn();
    }
  }

  /* ---------- 게임 시작 ---------- */
  function newGame(){
    deck = buildDeck();
    playerHand=[]; aiHand=[]; discard=[];
    gameOver=false; locked=false; hasDrawnThisTurn=false; pending=0; pendingType=null;
    for(let i=0;i<7;i++){ playerHand.push(drawCard()); aiHand.push(drawCard()); }
    let first = drawCard();
    while(first.value==='wild'||first.value==='wild4'||['skip','reverse','draw2'].includes(first.value)){
      deck.unshift(first);
      shuffle(deck);
      first = drawCard();
    }
    discard.push(first);
    currentColor = first.color;
    $('result-overlay').classList.remove('show');
    turn='player';
    msg('게임 시작! 당신 차례예요', 2200);
    render();
  }

  $('restart-btn').addEventListener('click', newGame);
  newGame();
})();
</script>
